<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECXION STOCK MANAGER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .card { background-color: #2d2d2d; border: none; color: white; }
        .form-control { background-color: #3d3d3d; border: 1px solid #555; color: white; }
        .form-control:focus { background-color: #444; color: white; }
    </style>
</head>
<body class="container py-5">
    <h2 class="mb-4 text-primary">📦 SECXION Stock Manager</h2>
    
    <div class="row">
        <!-- ฝั่งเพิ่มของ -->
        <div class="col-md-5 mb-4">
            <div class="card p-4">
                <h4>➕ เพิ่มสินค้าเข้าสต็อก</h4>
                <form action="/add_stock" method="POST">
                    <div class="mb-3">
                        <label class="form-label">ประเภทสินค้า</label>
                        <select name="type" class="form-control">
                            <option value="netflix">Netflix</option>
                            <option value="youtube">YouTube</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">รายละเอียดสินค้า (เช่น เมล:พาส)</label>
                        <textarea name="detail" class="form-control" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">บันทึกลงสต็อก</button>
                </form>
            </div>
        </div>

        <!-- ฝั่งดูสต็อกปัจจุบัน -->
        <div class="col-md-7">
            <div class="card p-4">
                <h4>📊 สต็อกปัจจุบัน</h4>
                <table class="table table-dark table-striped mt-3">
                    <thead>
                        <tr>
                            <th>ประเภท</th>
                            <th>จำนวนคงเหลือ</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for type, items in stocks.items() %}
                        <tr>
                            <td>{{ type.upper() }}</td>
                            <td>{{ items|length }} ชิ้น</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
