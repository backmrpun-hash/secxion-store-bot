<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>SECXION BULK MANAGER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; padding-top: 50px; }
        .card { background-color: #1a1a1a; border: 1px solid #333; }
        .form-control, .form-select { background-color: #252525; border: 1px solid #444; color: white; }
        .form-control:focus { background-color: #2d2d2d; color: white; }
    </style>
</head>
<body class="container">
    <h2 class="text-center text-primary mb-4">📦 SECXION BULK STOCK</h2>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <form action="/add_stock" method="POST">
                    <div class="mb-3">
                        <label class="form-label">เลือกประเภทสินค้า</label>
                        <select name="type" class="form-select">
                            <option value="netflix">Netflix</option>
                            <option value="youtube">YouTube</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">รายละเอียด (1 บรรทัด = 1 ชิ้น)</label>
                        <textarea name="detail" class="form-control" rows="10" placeholder="user1:pass1&#10;user2:pass2" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">บันทึกทั้งหมดเข้าสต็อก</button>
                </form>
            </div>
            <div class="mt-4 card p-3">
                <h5>📊 สต็อกคงเหลือ:</h5>
                <ul class="list-group list-group-flush">
                    {% for type, items in stocks.items() %}
                    <li class="list-group-item bg-transparent text-white d-flex justify-content-between">
                        {{ type|upper }} <span>{{ items|length if items is mapping else 0 }} ชิ้น</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
