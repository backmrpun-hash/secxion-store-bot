<!DOCTYPE html>
<html>
<head>
    <title>Secxion Backend</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-white p-5">
    <h2>📊 Dashboard ระบบจัดการร้านค้า</h2>
    <table class="table table-dark mt-4">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody>
            {% for uid, data in users.items() %}
            <tr>
                <td>{{ uid }}</td>
                <td>{{ data.balance }} บาท</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
